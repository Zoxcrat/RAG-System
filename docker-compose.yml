services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build: .
    image: rag-app:latest
    env_file: .env
    environment:
      # Reach Postgres over the compose network instead of localhost.
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    # Keep stdin/tty open for the interactive CLI (docker compose run --rm app).
    stdin_open: true
    tty: true

  api:
    build: .
    image: rag-app:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
